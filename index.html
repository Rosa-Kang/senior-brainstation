<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senior BrainStation - 시니어 두뇌 정거장</title>

  <!-- Favicon: 보라색 배경 + 뇌 아이콘 -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%236d28d9'/><stop offset='100%25' stop-color='%238b5cf6'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><text x='16' y='23' text-anchor='middle' font-size='18' font-family='Apple Color Emoji,Segoe UI Emoji,sans-serif'>🧠</text></svg>">
  <!-- iOS 홈 화면 아이콘 -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%236d28d9'/><stop offset='100%25' stop-color='%238b5cf6'/></linearGradient></defs><rect width='180' height='180' rx='40' fill='url(%23g)'/><text x='90' y='130' text-anchor='middle' font-size='110' font-family='Apple Color Emoji,Segoe UI Emoji,sans-serif'>🧠</text></svg>">
  <!-- 브라우저 탭 테마 컬러 -->
  <meta name="theme-color" content="#6d28d9">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; }
    
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 50%, #ddd6fe 100%);
      color: #4c1d95;
      overflow-x: hidden;
      position: relative;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: -100px;
      left: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(167, 139, 250, 0.4), transparent);
      filter: blur(60px);
      z-index: 0;
      pointer-events: none;
    }
    
    body::after {
      content: '';
      position: fixed;
      bottom: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(196, 181, 253, 0.5), transparent);
      filter: blur(60px);
      z-index: 0;
      pointer-events: none;
    }
    
    .app { position: relative; z-index: 1; min-height: 100vh; }
    
    /* ==================== 로그인 화면 ==================== */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 8px 32px 0 rgba(109, 40, 217, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      width: 100%;
      max-width: 460px;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .logo-icon {
      font-size: 56px;
      margin-bottom: 8px;
    }
    
    .logo-title {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #6d28d9 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    
    .logo-subtitle {
      font-size: 14px;
      color: #a78bfa;
      margin-top: 6px;
      font-weight: 500;
    }
    
    .form-group { margin-bottom: 20px; }
    
    .form-label {
      display: block;
      font-size: 14px;
      color: #7c3aed;
      font-weight: 500;
      margin-bottom: 8px;
    }
    
    .form-input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.6);
      border: 1.5px solid rgba(124, 58, 237, 0.2);
      border-radius: 12px;
      font-size: 15px;
      color: #4c1d95;
      transition: all 0.3s;
      outline: none;
    }
    
    .form-input:focus {
      border-color: #8b5cf6;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
    }
    
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6d28d9 0%, #8b5cf6 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px 0 rgba(109, 40, 217, 0.3);
      transition: all 0.3s;
      margin-top: 12px;
      font-family: 'Noto Sans KR', sans-serif;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px 0 rgba(109, 40, 217, 0.4);
    }
    
    .btn-primary:active { transform: translateY(0); }
    
    .toggle-mode {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #7c3aed;
    }
    
    .toggle-mode span {
      color: #6d28d9;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
    }
    
    /* ==================== 메인 앱 레이아웃 ==================== */
    .main-layout {
      display: flex;
      min-height: 100vh;
    }
    
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.4);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    
    .topbar-logo {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #6d28d9 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .day-pill {
      padding: 6px 14px;
      background: linear-gradient(135deg, #6d28d9 0%, #8b5cf6 100%);
      color: white;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 2px 8px 0 rgba(109, 40, 217, 0.3);
    }
    
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    
    .user-greeting {
      font-size: 14px;
      color: #7c3aed;
      font-weight: 500;
    }
    
    .btn-secondary {
      padding: 8px 16px;
      background: rgba(109, 40, 217, 0.1);
      border: 1px solid rgba(109, 40, 217, 0.3);
      border-radius: 10px;
      color: #6d28d9;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.3s;
    }
    
    .btn-secondary:hover { background: rgba(109, 40, 217, 0.2); }
    
    .content-wrapper {
      display: flex;
      gap: 24px;
      padding: 24px 32px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }
    
    .content-area {
      flex: 1;
      min-width: 0;
    }
    
    /* ==================== 사이드바 ==================== */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      position: sticky;
      top: 90px;
      height: fit-content;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 20px;
      box-shadow: 0 4px 20px 0 rgba(109, 40, 217, 0.08);
    }
    
    .sidebar-title {
      font-size: 12px;
      font-weight: 700;
      color: #7c3aed;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(124, 58, 237, 0.15);
    }
    
    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .nav-item {
      padding: 12px 16px;
      background: transparent;
      border: 1px solid rgba(124, 58, 237, 0.15);
      border-radius: 12px;
      color: #7c3aed;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.3s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .nav-item:hover {
      background: rgba(124, 58, 237, 0.05);
      transform: translateX(2px);
    }
    
    .nav-item.active {
      background: linear-gradient(135deg, #6d28d9 0%, #8b5cf6 100%);
      color: white;
      border: none;
      box-shadow: 0 4px 15px 0 rgba(109, 40, 217, 0.3);
    }
    
    .nav-icon { font-size: 18px; }
    
    /* ==================== 페이지 공통 ==================== */
    .page-header { margin-bottom: 24px; }
    
    .page-title {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #4c1d95 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }
    
    .page-subtitle {
      font-size: 14px;
      color: #a78bfa;
      font-weight: 500;
    }
    
    /* ==================== 카드 ==================== */
    .card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px 0 rgba(109, 40, 217, 0.08);
      transition: all 0.3s;
    }
    
    .card-badge {
      display: inline-block;
      padding: 5px 12px;
      background: rgba(109, 40, 217, 0.1);
      color: #6d28d9;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .card-title {
      font-size: 22px;
      font-weight: 700;
      color: #4c1d95;
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }
    
    /* ==================== 언어영역 ==================== */
    .article-content {
      font-size: 15px;
      color: #5d4e9e;
      line-height: 1.9;
      margin-bottom: 20px;
      font-family: 'Nanum Myeongjo', serif;
    }
    
    
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124, 58, 237, 0.3), transparent);
      margin: 24px 0;
    }
    
    .question-block {
      margin-bottom: 20px;
    }
    
    .kind-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      margin-right: 8px;
      vertical-align: middle;
    }
    
    .kind-fact {
      background: rgba(59, 130, 246, 0.12);
      color: #1d4ed8;
    }
    
    .kind-insight {
      background: linear-gradient(135deg, rgba(109, 40, 217, 0.15) 0%, rgba(139, 92, 246, 0.18) 100%);
      color: #6d28d9;
    }
    
    .question-text {
      font-size: 15px;
      color: #4c1d95;
      font-weight: 600;
      margin-bottom: 12px;
      line-height: 1.6;
    }
    
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    
    .option-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.5);
      border: 1.5px solid rgba(124, 58, 237, 0.15);
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      color: #5d4e9e;
      transition: all 0.3s;
      font-weight: 500;
    }
    
    .option-label:hover {
      background: rgba(124, 58, 237, 0.05);
      border-color: rgba(124, 58, 237, 0.3);
    }
    
    .option-label.selected {
      background: rgba(139, 92, 246, 0.15);
      border-color: #8b5cf6;
      color: #4c1d95;
    }
    
    .option-label.correct {
      background: rgba(34, 197, 94, 0.15);
      border-color: #16a34a;
      color: #15803d;
    }
    
    .option-label.wrong {
      background: rgba(239, 68, 68, 0.15);
      border-color: #ef4444;
      color: #b91c1c;
    }
    
    .option-label input[type="radio"] {
      accent-color: #8b5cf6;
      cursor: pointer;
    }
    
    .feedback-box {
      margin-top: 16px;
      padding: 16px 18px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      animation: slideIn 0.3s ease-out;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .feedback-correct {
      background: rgba(34, 197, 94, 0.1);
      border-left: 4px solid #16a34a;
      color: #15803d;
    }
    
    .feedback-wrong {
      background: rgba(239, 68, 68, 0.1);
      border-left: 4px solid #ef4444;
      color: #b91c1c;
    }
    
    .feedback-title { font-weight: 700; margin-bottom: 6px; }
    
    /* ==================== 수리영역 ==================== */
    .problem-display {
      font-size: 24px;
      font-weight: 700;
      color: #4c1d95;
      text-align: center;
      padding: 32px;
      background: rgba(109, 40, 217, 0.05);
      border-radius: 16px;
      margin: 20px 0;
      letter-spacing: 2px;
      font-family: 'Nanum Myeongjo', serif;
    }
    
    .options-vertical {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    /* ==================== 뇌훈련 ==================== */
    .game-container {
      text-align: center;
      padding: 20px 0;
    }
    
    .game-instruction {
      font-size: 15px;
      color: #5d4e9e;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    
    .number-display {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 32px 0;
      flex-wrap: wrap;
    }
    
    .number-cell {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #6d28d9 0%, #8b5cf6 100%);
      color: white;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      box-shadow: 0 4px 15px 0 rgba(109, 40, 217, 0.3);
      animation: numberPop 0.4s ease-out;
    }
    
    @keyframes numberPop {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    .number-cell.hidden {
      background: rgba(196, 181, 253, 0.3);
      color: transparent;
    }
    
    .input-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 24px 0;
      flex-wrap: wrap;
    }
    
    .number-input {
      width: 56px;
      height: 56px;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.7);
      border: 2px solid rgba(124, 58, 237, 0.3);
      border-radius: 12px;
      color: #4c1d95;
      outline: none;
      transition: all 0.3s;
    }
    
    .number-input:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
    }
    
    .timer {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, #6d28d9 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 24px 0;
    }
    
    .difference-game {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 24px 0;
    }
    
    .difference-box {
      background: rgba(255, 255, 255, 0.5);
      border: 2px solid rgba(124, 58, 237, 0.2);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      font-size: 32px;
      letter-spacing: 8px;
      line-height: 1.8;
      font-family: 'Nanum Myeongjo', serif;
      transition: all 0.3s;
    }
    
    .difference-box:hover {
      transform: scale(1.02);
      border-color: #8b5cf6;
    }
    
    /* ==================== 오답노트 ==================== */
    .day-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    
    .day-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 18px;
      border: 1.5px solid rgba(255, 255, 255, 0.4);
      padding: 22px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px 0 rgba(109, 40, 217, 0.08);
      min-height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    
    .day-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px 0 rgba(109, 40, 217, 0.2);
      border-color: rgba(139, 92, 246, 0.4);
    }
    
    .day-card.today {
      border: 2.5px solid #8b5cf6;
      background: rgba(255, 255, 255, 0.85);
    }
    
    .day-card-number {
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(135deg, #6d28d9 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    
    .day-card-date {
      font-size: 12px;
      color: #a78bfa;
      margin-top: 4px;
      font-weight: 500;
    }
    
    .today-badge {
      display: inline-block;
      padding: 4px 10px;
      background: linear-gradient(135deg, #6d28d9 0%, #8b5cf6 100%);
      color: white;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 8px;
    }
    
    .day-card-stats {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 12px;
      font-size: 12px;
    }
    
    .day-card-stat {
      display: flex;
      justify-content: space-between;
      color: #7c3aed;
    }
    
    .day-card-stat strong {
      color: #4c1d95;
      font-weight: 600;
    }
    
    .domain-tags {
      display: flex;
      gap: 4px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    
    .domain-tag {
      font-size: 10px;
      padding: 3px 8px;
      background: rgba(124, 58, 237, 0.1);
      color: #6d28d9;
      border-radius: 6px;
      font-weight: 600;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #a78bfa;
    }
    
    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    .empty-state-text {
      font-size: 16px;
      font-weight: 500;
    }
    
    /* ==================== 블로그 포스트 뷰 ==================== */
    .blog-view {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 40px;
      box-shadow: 0 8px 32px 0 rgba(109, 40, 217, 0.1);
    }
    
    .blog-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: rgba(109, 40, 217, 0.1);
      border: 1px solid rgba(109, 40, 217, 0.2);
      border-radius: 10px;
      color: #6d28d9;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Noto Sans KR', sans-serif;
      margin-bottom: 24px;
      transition: all 0.3s;
    }
    
    .blog-back-btn:hover {
      background: rgba(109, 40, 217, 0.15);
      transform: translateX(-2px);
    }
    
    .blog-header {
      border-bottom: 2px solid rgba(124, 58, 237, 0.15);
      padding-bottom: 24px;
      margin-bottom: 32px;
    }
    
    .blog-day-tag {
      display: inline-block;
      padding: 6px 14px;
      background: linear-gradient(135deg, #6d28d9 0%, #8b5cf6 100%);
      color: white;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    
    .blog-title {
      font-size: 28px;
      font-weight: 700;
      color: #4c1d95;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    
    .blog-meta {
      font-size: 14px;
      color: #a78bfa;
      font-weight: 500;
    }
    
    .blog-question {
      background: rgba(255, 255, 255, 0.5);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border-left: 4px solid #8b5cf6;
    }
    
    .blog-q-domain {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(139, 92, 246, 0.15);
      color: #6d28d9;

    // 시드 기반 일별 시사 질문 선택 (Day별 결정론적)
    function getDailyCategoryQuestions(categoryKey, day) {
      const pool = CATEGORY_QUESTIONS[categoryKey] || [];
      if (pool.length === 0) return [];
      // pool.length와 서로소가 되도록 step 선택 (6과 서로소인 1 또는 5 사용)
      // pool.length=6일 때 6일 주기로 모든 조합 순회
      const idx1 = day % pool.length;
      const idx2 = (day + 2) % pool.length;
      const q1 = pool[idx1];
      const q2 = pool[idx2 === idx1 ? (idx1 + 1) % pool.length : idx2];
      return [q1, q2];
    }
    
    // ==================== RSS 뉴스 가져오기 ====================
    // RSS XML 파싱 (브라우저 내장 DOMParser 사용)
    // RSS에서 실제 기사 URL 추출 (여러 방법 순차 시도)
    function extractArticleLink(item, rawXml, itemIndex) {
      // 방법 1: <link> 태그 텍스트 (RSS 2.0 표준)
      const linkEl = item.querySelector('link');
      if (linkEl) {
        const t = linkEl.textContent.trim();
        if (t.startsWith('http')) return t;
        // XML 파싱에서 <link>는 self-closing으로 처리될 수 있어 nextSibling 확인
        const sib = linkEl.nextSibling;
        if (sib && sib.textContent) {
          const st = sib.textContent.trim();
          if (st.startsWith('http')) return st;
        }
      }
      
      // 방법 2: <guid isPermaLink="true"> (연합뉴스, 한겨레 등 다수 사용)
      const guidEl = item.querySelector('guid');
      if (guidEl) {
        const isPerma = guidEl.getAttribute('isPermaLink');
        const gt = guidEl.textContent.trim();
        if (gt.startsWith('http') && isPerma !== 'false') return gt;
      }
      
      // 방법 3: <origLink> 또는 <source url="..."> (일부 피드)
      const origLink = item.querySelector('origLink');
      if (origLink) {
        const ot = origLink.textContent.trim();
        if (ot.startsWith('http')) return ot;
      }
      
      // 방법 4: 원본 XML 텍스트에서 정규식으로 해당 <item> 블록 추출
      // itemIndex번째 <item>의 <link> 값을 직접 추출
      if (rawXml) {
        const itemBlocks = rawXml.match(/<item[\s\S]*?<\/item>/gi) || [];
        const block = itemBlocks[itemIndex] || '';
        // CDATA 포함 <link> 추출
        const m = block.match(/<link>(?:<!\[CDATA\[)?(https?:\/\/[^\]<\s]+)/i);
        if (m) return m[1];
      }
      
      return '';
    }
    
    function parseRSSXML(xmlStr) {
      if (!xmlStr) return [];
      try {
        const parser = new DOMParser();
        const doc = parser.parseFromString(xmlStr, 'text/xml');
        if (doc.querySelector('parsererror')) return [];
        const items = doc.querySelectorAll('item');
        return [...items].slice(0, 1).map((item, idx) => ({
          title: cleanRSSText(item.querySelector('title')?.textContent || ''),
          description: item.querySelector('description')?.textContent || '',
          link: extractArticleLink(item, xmlStr, idx)
        }));
      } catch (e) {
        return [];
      }
    }
    
    // 텍스트 정리 (HTML 태그, CDATA, 특수문자 제거)
    function cleanRSSText(raw) {
      if (!raw) return '';
      return raw
        .replace(/<!\[CDATA\[|\]\]>/g, '')
        .replace(/<[^>]*>/g, '')
        .replace(/&nbsp;/g, ' ')
        .replace(/&amp;/g, '&')
        .replace(/&lt;/g, '<')
        .replace(/&gt;/g, '>')
        .replace(/&quot;/g, '"')
        .replace(/&#[0-9]+;/g, '')
        .replace(/\s+/g, ' ')
        .trim()
        .substring(0, 300);
    }
    
    // ── CORS 프록시 목록 (raw 텍스트 반환, 가장 빠른 것 채택) ──────────────
    // ==================== GNews API 설정 ====================
    // 한국 뉴스 사이트들이 해외 IP를 차단하므로 전용 뉴스 API 사용
    // 무료: 하루 100건 (우리 앱은 하루 3건만 사용)
    // 키 변경 시: ⚙️ 설정 → GNews API 키
    // ── Claude API: 기사별 맞춤 시사 문제 생성 (Netlify Function 경유) ──
    async function generateQuestionsForArticle(title, summary, categoryLabel) {
      console.log(`🤖 [Claude] generateQuestionsForArticle 호출: ${categoryLabel} — "${title.substring(0, 40)}"`);

      const res = await fetch('/.netlify/functions/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, summary, categoryLabel })
      });

      if (!res.ok) {
        const errBody = await res.json().catch(() => ({}));
        console.error(`❌ Claude API ${res.status}:`, JSON.stringify(errBody));
        throw new Error(`Claude HTTP ${res.status}: ${errBody?.error?.message || ''}`);
      }
      const data = await res.json();
      const raw = data.content?.[0]?.text || '';
      const clean = raw.replace(/```json\n?|```/g, '').trim();
      const questions = JSON.parse(clean);
      return questions.map((q, i) => ({
        ...q,
        id: `ai_${Date.now()}_${i}`
      }));
    }
    
    // GNews API로 카테고리별 최신 한국 뉴스 1건 fetch
    async function fetchFromGNews(categoryKey) {
      const cat = categoryKey;
      const url = `/.netlify/functions/gnews?category=${cat}`;

      console.log(`\n━━━ [GNews → Netlify Function] 요청: ${cat} ━━━`);

      const timeout = new Promise((_, reject) =>
        setTimeout(() => reject(new Error('요청 시간 초과')), 12000)
      );

      let res;
      try {
        res = await Promise.race([fetch(url), timeout]);
      } catch (e) {
        console.error(`❌ [${cat}] fetch 실패:`, e.message);
        throw e;
      }

      console.log(`📥 [${cat}] HTTP 상태:`, res.status);

      if (!res.ok) throw new Error(`GNews 프록시 오류 (HTTP ${res.status})`);

      const data = await res.json();
      console.log(`✅ [${cat}] 기사 수:`, data.articles?.length ?? 0);

      if (!data.articles?.length) throw new Error('오늘 해당 카테고리 기사 없음');

      const a = data.articles[0];
      return {
        title: a.title || '제목 없음',
        description: a.description || a.content?.substring(0, 200) || '',
        link: a.url || ''
      };
    }
    
    // 카테고리별 뉴스 가져오기
    async function fetchCategoryNews(category) {
      const base = {
        categoryKey: category.key,
        categoryLabel: category.label,
        categoryIcon: category.icon
      };
      
      try {
        const item = await fetchFromGNews(category.key);
        return {
          ...base,
          ok: true,
          title: item.title,
          summary: item.description,
          link: item.link
        };
      } catch (e) {
        console.warn(`[${category.label}] GNews 실패:`, e.message);
        // 실패 시 폴백 기사
        const fallback = FALLBACK_ARTICLES[category.key];
        return {
          ...base,
          ok: true,
          isFallback: true,
          errorMsg: e.message,
          title: fallback.title,
          summary: fallback.summary,
          link: fallback.link
        };
      }
    }
    
    async function fetchTodaysNews() {
      // Step 1: GNews 순차 요청 (초당 1건 rate limit)
      const articles = [];
      for (let i = 0; i < NEWS_CATEGORIES.length; i++) {
        const result = await fetchCategoryNews(NEWS_CATEGORIES[i]);
        articles.push(result);
        if (i < NEWS_CATEGORIES.length - 1) {
          await new Promise(r => setTimeout(r, 1200));
        }
      }
      
      // Step 2: Claude 병렬 질문 생성 (GNews rate limit 없음)
      console.log('[Claude] 기사별 맞춤 질문 생성 중...');
      await Promise.all(articles.map(async (article) => {
        if (article.ok && !article.isFallback && article.title) {
          try {
            article.questions = await generateQuestionsForArticle(
              article.title,
              article.summary,
              article.categoryLabel
            );
            console.log(`✅ [Claude] ${article.categoryLabel} 질문 생성 완료 | id 예시: ${article.questions[0]?.id}`);
            console.log('생성된 질문 1:', article.questions[0]?.text);
          } catch (e) {
            console.warn(`⚠️ [Claude] ${article.categoryLabel} 질문 생성 실패:`, e.message);
            // 실패 시 기존 카테고리 질문 풀로 폴백
            article.questions = getDailyCategoryQuestions(article.categoryKey, state.currentDay);

    // =====================================================
    // 알고리즘 자동 생성 함수들
    // =====================================================
    // 매일 다른 문제를 만들지만 특정 시드(day number)에서는
    // 항상 같은 문제가 나오도록 결정론적(deterministic)으로 작동

    // 시드 기반 의사난수 생성 (같은 시드면 같은 결과)
    function seedRandom(seed) {
      let s = seed;
      return function() {
        s = (s * 9301 + 49297) % 233280;
        return s / 233280;
      };
    }

    function pickRandom(arr, rng) {
      return arr[Math.floor(rng() * arr.length)];
    }

    // ----- 등차수열 자동 생성 -----
    function genArithmetic(seed) {
      const rng = seedRandom(seed);
      const start = Math.floor(rng() * 20) + 1;
      const diff = Math.floor(rng() * 8) + 2;
      const seq = [start, start + diff, start + diff*2, start + diff*3];
      const correct = start + diff*4;
  
      // 오답은 정답 ±1, ±diff 등으로 만듦
      const distractors = [correct - diff, correct + diff, correct + 1].filter((v, i, a) => a.indexOf(v) === i && v !== correct).slice(0, 3);
      while (distractors.length < 3) distractors.push(correct + distractors.length + 5);
  
      const allOptions = [correct, ...distractors];
      // 옵션 위치를 시드에 따라 결정론적으로 섞기
      const shuffled = [...allOptions].sort(() => rng() - 0.5);
      const correctIdx = shuffled.indexOf(correct);
  
      return {
        id: `auto_arith_${seed}`,
        cat: '수열',
        diff: 'easy',
        q: `${seq.join(', ')}, ?`,
        opts: shuffled.map(String),
        correct: correctIdx,
        exp: `각 숫자는 ${diff}씩 증가하는 등차수열입니다. ${seq[3]} + ${diff} = ${correct}`,
        isAuto: true
      };
    }

    // ----- 등비수열 자동 생성 -----
    function genGeometric(seed) {
      const rng = seedRandom(seed + 1000);
      const start = Math.floor(rng() * 4) + 2;  // 2~5
      const ratio = Math.floor(rng() * 3) + 2;  // 2~4
      const seq = [start, start * ratio, start * ratio * ratio, start * ratio * ratio * ratio];
      const correct = start * Math.pow(ratio, 4);
  
      const distractors = [correct - ratio, correct + ratio, correct * 2].filter(v => v !== correct).slice(0, 3);
      while (distractors.length < 3) distractors.push(correct + distractors.length * 7);
  
      const allOptions = [correct, ...distractors];
      const shuffled = [...allOptions].sort(() => rng() - 0.5);
      const correctIdx = shuffled.indexOf(correct);
  
      return {
        id: `auto_geo_${seed}`,
        cat: '수열',
        diff: 'medium',
        q: `${seq.join(', ')}, ?`,
        opts: shuffled.map(String),
        correct: correctIdx,
        exp: `각 숫자는 ${ratio}배씩 증가하는 등비수열입니다. ${seq[3]} × ${ratio} = ${correct}`,
        isAuto: true
      };
    }

    // ----- 비교 논리 자동 생성 -----
    function genComparison(seed) {
      const rng = seedRandom(seed + 2000);
      const names = ['민수', '영희', '철수', '지영', '동현', '수진', '하늘', '재호', '소영', '준호'];
      const props = ['키', '나이', '점수', '몸무게', '독서량'];
  
      const shuffledNames = [...names].sort(() => rng() - 0.5);
      const [A, B, C] = shuffledNames.slice(0, 3);
      const prop = pickRandom(props, rng);
      const optsRaw = [A, B, C, '알 수 없다'];
      const shuffled = [...optsRaw].sort(() => rng() - 0.5);
      const correctIdx = shuffled.indexOf(A);
  
      return {
        id: `auto_cmp_${seed}`,
        cat: '논리',
        diff: 'easy',
        q: `${A}는 ${B}보다 ${prop}가 큽니다. ${B}는 ${C}보다 ${prop}가 큽니다. 가장 ${prop}가 큰 사람은?`,
        opts: shuffled,
        correct: correctIdx,
        exp: `${A} > ${B} > ${C}이므로 가장 ${prop}가 큰 사람은 ${A}입니다`,
        isAuto: true
      };
    }

    // ----- 시각 패턴 자동 생성 -----
    function genVisualPattern(seed) {
      const rng = seedRandom(seed + 3000);
      const symbolSets = [
        ['◯', '△', '□', '◇'],
        ['★', '♥', '◯', '◆'],
        ['↑', '→', '↓', '←'],
        ['🌸', '🌳', '🌊', '🏔'],
        ['1', '2', '3', '4']
      ];
      const set = pickRandom(symbolSets, rng);
      const shuffled = [...set].sort(() => rng() - 0.5);
      const [a, b, c, d] = shuffled;
  
      // a b c a b c a ? 패턴 (정답: b)
      const correct = b;
      const opts = [a, b, c, d];
      const shuffledOpts = [...opts].sort(() => rng() - 0.5);
      const correctIdx = shuffledOpts.indexOf(b);
  
      return {
        id: `auto_pat_${seed}`,
        cat: '시각패턴',
        diff: 'easy',
        q: `${a} ${b} ${c} ${a} ${b} ${c} ${a} ?`,
        opts: shuffledOpts,
        correct: correctIdx,
        exp: `${a} ${b} ${c} 가 반복되는 패턴입니다. ${a} 다음은 ${b}입니다`,
        isAuto: true
      };
    }

    // ----- 실생활 수리 자동 생성 -----
    function genPracticalMath(seed) {
      const rng = seedRandom(seed + 4000);
      const items = ['사과', '귤', '배', '딸기', '책', '연필', '공책'];
      const item = pickRandom(items, rng);
      const price = (Math.floor(rng() * 9) + 1) * 1000;  // 1000~9000
      const quantity = Math.floor(rng() * 5) + 2;  // 2~6
      const correct = price * quantity;
  
      const distractors = [
        correct - price,
        correct + price,
        price * (quantity + 1)
      ].filter(v => v !== correct).slice(0, 3);
      while (distractors.length < 3) distractors.push(correct + distractors.length * 1000);
  
      const allOptions = [correct, ...distractors];
      const shuffled = [...allOptions].sort(() => rng() - 0.5);
      const correctIdx = shuffled.indexOf(correct);
  
      return {
        id: `auto_prac_${seed}`,
        cat: '실생활',
        diff: 'easy',
        q: `${price.toLocaleString()}원짜리 ${item} ${quantity}개의 가격은?`,
        opts: shuffled.map(v => v.toLocaleString() + '원'),
        correct: correctIdx,
        exp: `${price.toLocaleString()}원 × ${quantity}개 = ${correct.toLocaleString()}원`,
        isAuto: true
      };
    }

    // =====================================================
    // 일일 문제 선택 로직
    // =====================================================
    // 매일 3문제: 큐레이션 1개 + 알고리즘 2개
    // 큐레이션은 최근 150일 본 것은 회피

    function getDailyMathProblems(dayNumber, recentlySeenIds) {
      const day = dayNumber || 1;
      const recent = recentlySeenIds || [];
  
      // === 큐레이션 1개 선택 ===
      // 최근 150일에 못 본 문제만 후보
      const available = CURATED_MATH.filter(q => !recent.includes(q.id));
  
      // 후보가 없으면 (모두 봄) 가장 오래된 것부터 다시
      const curatedPool = available.length > 0 ? available : CURATED_MATH;
  
      // day 번호로 결정론적 선택 (같은 날이면 같은 문제)
      const curatedIdx = (day * 7 + 3) % curatedPool.length;
      const curated = { ...curatedPool[curatedIdx] };
  
      // === 알고리즘 2개 생성 ===
      // 5가지 알고리즘 중 day에 따라 2개 선택
      const generators = [
        genArithmetic,
        genGeometric,
        genComparison,
        genVisualPattern,
        genPracticalMath
      ];
  
      const algoIdx1 = day % generators.length;
      const algoIdx2 = (day + 2) % generators.length;
  
      const auto1 = generators[algoIdx1](day * 100 + 1);
      const auto2 = generators[algoIdx2](day * 100 + 2);
  
      return [curated, auto1, auto2];
    }

    // =====================================================
    // 뇌 훈련 자동 생성 (매일 다른 게임)
    // =====================================================

    // 기억력: 무작위 5자리 숫자
    function genMemoryGame(day) {
      const rng = seedRandom(day + 5000);
      const numbers = [];
      for (let i = 0; i < 5; i++) {
        numbers.push(Math.floor(rng() * 10));
      }
      return {
        id: `mem_${day}`,
        type: '숫자 기억',
        instruction: '5초 동안 보여지는 숫자를 순서대로 기억하세요',
        numbers,
        showTime: 5000
      };
    }

    // 다른 글자 찾기: 단어 풀에서 한 글자 변경
    function genPerceptionGame(day) {
      const rng = seedRandom(day + 6000);
      const wordPairs = [
        { original: '오늘하늘이참맑네요', changed: '오늘하늘이참막네요', diff: '맑 → 막' },
        { original: '봄여름가을겨울사계절', changed: '봄여름가을겨을사계절', diff: '겨울 → 겨을' },
        { original: '책상위에연필이있어요', changed: '책상위에연팔이있어요', diff: '연필 → 연팔' },
        { original: '아침에커피한잔어때요', changed: '아침에커피한잔어떼요', diff: '어때 → 어떼' },
        { original: '공원산책이건강에좋아', changed: '공원산책이건간에좋아', diff: '건강 → 건간' },
        { original: '손자손녀와함께시간보내', changed: '손자손너와함께시간보내', diff: '손녀 → 손너' },
        { original: '바람이부는날씨좋아요', changed: '바람이부는날씨좋아오', diff: '요 → 오' },
        { original: '맛있는음식을먹으니행복', changed: '맛있는음식을먹으니행북', diff: '복 → 북' },
        { original: '도서관에서책을빌렸어요', changed: '도서간에서책을빌렸어요', diff: '관 → 간' },
        { original: '친구들과만나서반가워요', changed: '친구들과만나서반가위요', diff: '워 → 위' }
      ];
      const pair = wordPairs[day % wordPairs.length];
  
      return {
        id: `per_${day}`,
        type: '다른 글자 찾기',

        expectedDiff: pair.diff,
        explanation: `정답: ${pair.diff}`
      };
    }

    // ==================== 상태 관리 ====================
    const STORAGE_KEY = 'senior_brain_station';
    
    function getDefaultState() {
      return {
        userEmail: '',
        userName: '',
        gnewsApiKey: '',   // GNews API 키 (https://gnews.io/register 무료 발급)
        firstStudyDate: null,
        lastStudyDate: null,
        currentDay: 1,
        progress: {},
        wrongAnswers: [],
        currentPage: 'language',
        seenMathIds: [],
        cachedNews: null,
        cachedNewsDate: null
      };
    }
    
    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          return { ...getDefaultState(), ...JSON.parse(saved) };
        }
      } catch (e) {
        console.error('Storage load failed:', e);
      }
      return getDefaultState();
    }
    
    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (e) {
        console.error('Storage save failed:', e);
      }
    }
    
    let state = loadState();
    
    // ==================== Day 시스템 ====================
    function getTodayString() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
    }
    
    function calculateDay() {
      if (!state.firstStudyDate) return 1;
      const first = new Date(state.firstStudyDate);
      const today = new Date(getTodayString());
      const diff = Math.floor((today - first) / (1000 * 60 * 60 * 24));
      return diff + 1;
    }
    
    function updateDayOnLogin() {
      const today = getTodayString();
      if (!state.firstStudyDate) {
        state.firstStudyDate = today;
        state.currentDay = 1;
      } else {
        state.currentDay = calculateDay();
      }
      state.lastStudyDate = today;
      saveState();
    }
    
    function getDateForDay(dayNum) {
      if (!state.firstStudyDate) return '';
      const first = new Date(state.firstStudyDate);
      first.setDate(first.getDate() + (dayNum - 1));
      return `${first.getFullYear()}년 ${first.getMonth() + 1}월 ${first.getDate()}일`;
    }
    
    
    // ==================== 진행도 관리 ====================
    function getDayProgress(dayNum) {
      return state.progress[dayNum] || {
        language: { attempted: false, answers: {} },
        math: { attempted: false, answers: {} },
        memory: { attempted: false, success: false },
        perception: { attempted: false, success: false }
      };
    }
    
    function updateProgress(dayNum, domain, data) {
      if (!state.progress[dayNum]) {
        state.progress[dayNum] = {
          language: { attempted: false, answers: {} },
          math: { attempted: false, answers: {} },
          memory: { attempted: false, success: false },
          perception: { attempted: false, success: false }
        };
      }
      state.progress[dayNum][domain] = { ...state.progress[dayNum][domain], ...data };
      saveState();
    }
    
    function addWrongAnswer(domain, question, userAnswer, correctAnswer, explanation) {
      const wrong = {
        id: `w_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`,
        day: state.currentDay,
        date: getTodayString(),
        domain,
        question,
        userAnswer,
        correctAnswer,
        explanation,
        timestamp: Date.now()
      };
      state.wrongAnswers.push(wrong);
      saveState();
    }
    
    function getWrongAnswersByDay() {
      const grouped = {};
      state.wrongAnswers.forEach(w => {
        if (!grouped[w.day]) grouped[w.day] = [];
        grouped[w.day].push(w);
      });
      return grouped;
    }
    
    // ==================== 렌더링 ====================
    const app = document.getElementById('app');
    
    function render() {
      // 첫 방문 자동 인식 — 로그인 없이 즉시 사용 가능
      if (!state.firstStudyDate) {
        state.firstStudyDate = getTodayString();
        state.currentDay = 1;
        state.lastStudyDate = getTodayString();
        saveState();
      } else {
        // 매번 호출 시 Day 자동 업데이트
        const newDay = calculateDay();
        if (newDay !== state.currentDay) {
          state.currentDay = newDay;
          state.lastStudyDate = getTodayString();
          saveState();
        }
      }
      renderMainApp();
    }

      modal.className = 'modal-overlay';

      modal.innerHTML = `
        <div class="modal-card">
          <h2 class="modal-title">⚙️ 설정</h2>

              무료 발급 (2분): 
              <a href="https://gnews.io/register" target="_blank" style="color:#6d28d9; font-weight:700; text-decoration:underline;">gnews.io/register</a>
              → 이메일 인증 → 대시보드에서 API Key 복사
              <br>무료 플랜: 하루 100건 (우리 앱은 3건만 사용)

      document.body.appendChild(modal);
    }
    
    function closeSettings() {
      const modal = document.querySelector('.modal-overlay');
      if (modal) modal.remove();
    }
    
    function saveSettings() {
      state.userName = document.getElementById('settings-name').value.trim();
      state.userEmail = document.getElementById('settings-email').value.trim();
      const newKey = document.getElementById('settings-gnews').value.trim();
      // API 키가 바뀌면 뉴스 캐시 초기화 (새 키로 다시 불러옴)
      if (newKey !== state.gnewsApiKey) {
        state.cachedNews = null;
        state.cachedNewsDate = null;
      }
      state.gnewsApiKey = newKey;
      saveState();
      closeSettings();
      render();
    }
    
    function renderMainApp() {
      const greeting = state.userName ? `안녕하세요, ${state.userName}님 👋` : '오늘도 좋은 하루입니다 🌟';
      
      app.innerHTML = `
        <div class="topbar">
          <div class="topbar-left">
            <div class="topbar-logo">🧠 Senior BrainStation</div>
            <div class="day-pill">Day ${state.currentDay}</div>
          </div>
          <div class="topbar-right">
            <span class="user-greeting">${greeting}</span>
            <button class="btn-secondary" onclick="openSettings()">⚙️ 설정</button>
          </div>
        </div>
        
        <div class="content-wrapper">
          <div class="content-area" id="content-area"></div>
          
          <aside class="sidebar">
            <div class="sidebar-title">📚 학습영역</div>
            <div class="nav-list">
              <button class="nav-item ${state.currentPage === 'language' ? 'active' : ''}" onclick="navigateTo('language')">
                <span class="nav-icon">📖</span> 언어영역
              </button>
              <button class="nav-item ${state.currentPage === 'math' ? 'active' : ''}" onclick="navigateTo('math')">
                <span class="nav-icon">🔢</span> 수리영역
              </button>
              <button class="nav-item ${state.currentPage === 'brain' ? 'active' : ''}" onclick="navigateTo('brain')">
                <span class="nav-icon">🧠</span> 뇌 훈련
              </button>
              <button class="nav-item ${state.currentPage === 'email' ? 'active' : ''}" onclick="navigateTo('email')">
                <span class="nav-icon">✉️</span> 이메일 정리
              </button>
            </div>
          </aside>
        </div>
      `;
      
      renderCurrentPage();
    }
    
    function navigateTo(page) {
      // Day가 변경되었을 수 있으니 캐시 무효화 체크
      if (todaysMathDay !== state.currentDay) {
        todaysMathProblems = null;
        todaysMemoryGame = null;
        todaysPerceptionGame = null;
      }
      state.currentPage = page;
      saveState();
      render();
    }
    
    function renderCurrentPage() {
      const container = document.getElementById('content-area');
      switch (state.currentPage) {
        case 'language': renderLanguagePage(container); break;
        case 'math': renderMathPage(container); break;
        case 'brain': renderBrainPage(container); break;
        case 'email': renderEmailPage(container); break;
      }
    }
    
    // ==================== 언어영역 ====================
    async function renderLanguagePage(container) {
      const dayProgress = getDayProgress(state.currentDay);
      const todayStr = getTodayString();
      
      // 헤더만 먼저 그리고 로딩 표시
      container.innerHTML = `
        <div class="page-header">
          <h1 class="page-title">📖 언어영역</h1>
          <p class="page-subtitle">오늘의 실시간 뉴스로 독해와 시사 사고 훈련</p>
        </div>
        
        ${dayProgress.language.attempted ? `
          <div class="complete-banner">
            <div class="complete-banner-icon">✅</div>
            <div class="complete-banner-text">오늘의 언어영역을 완료했습니다!<br>내일 다시 새로운 뉴스로 만나요.</div>
          </div>
        ` : ''}
        
        <div id="news-container">
          <div class="card">
            <div class="loading-state">
              <div class="loading-spinner"></div>
              <p>오늘의 뉴스를 불러오는 중...</p>
              <p style="font-size:12px; color:#a78bfa; margin-top:8px;">뉴스 수집 + AI 맞춤 질문 생성 중 (약 10-15초)</p>
            </div>
          </div>
        </div>
      `;
      
      // 캐시 유효 조건: 오늘 날짜 + AI 생성 질문(ai_ 접두사)까지 확인
      // 정적 풀 질문이 들어있는 구버전 캐시는 무효화 → Claude로 재생성
      const cacheValid = state.cachedNewsDate === todayStr
        && state.cachedNews
        && state.cachedNews.length > 0
        && state.cachedNews[0]?.questions?.length > 0
        && state.cachedNews[0]?.questions[0]?.id?.startsWith('ai_');  // ← AI 생성인지 확인

      console.log('📖 [언어영역] 캐시 검사:', {
        dateMatch: state.cachedNewsDate === todayStr,
        hasCache: !!state.cachedNews,
        hasQuestions: !!state.cachedNews?.[0]?.questions,
        isAI: state.cachedNews?.[0]?.questions?.[0]?.id?.startsWith('ai_'),
        firstQId: state.cachedNews?.[0]?.questions?.[0]?.id,
        cacheValid
      });

      let newsItems;
      if (cacheValid) {
        console.log('✅ 캐시 사용 (AI 질문 포함) — fetchTodaysNews 건너뜀');
        newsItems = state.cachedNews;
      } else {
        console.log('🔄 캐시 없음 또는 AI 질문 없음 — fetchTodaysNews 호출');
        try {
          newsItems = await fetchTodaysNews();
          state.cachedNews = newsItems;
          state.cachedNewsDate = todayStr;
          saveState();
        } catch (e) {
          document.getElementById('news-container').innerHTML = `
            <div class="card">
              <p style="color:#dc2626; padding:20px;">뉴스를 불러오지 못했습니다: ${e.message}</p>
              <button class="btn-primary" onclick="renderCurrentPage()">다시 시도</button>
            </div>
          `;
          return;
        }
      }
      
      // 각 뉴스 카드 그리기
      const newsContainer = document.getElementById('news-container');
      newsContainer.innerHTML = newsItems.map((news, idx) => {
        // API 키 미설정 (이론적으로 도달 안 하지만 안전장치)
        if (!news.ok && news.needsSetup) {
          return `
            <div class="card">
              <span class="card-badge">${news.categoryIcon} ${news.categoryLabel}</span>
              <p style="color:#92400e; margin-top:12px;">
                ⚙️ GNews API 키를 설정해 주세요. 우측 상단 설정 버튼을 눌러 키를 입력하세요.
              </p>
            </div>
          `;
        }
        
        const articleId = `art_${state.currentDay}_${news.categoryKey}`;
        const questions = news.questions || getDailyCategoryQuestions(news.categoryKey, state.currentDay);
        // 전역 맵에 저장 (onclick에 복잡한 JSON 직렬화 불필요)
        if (!window._newsQuestions) window._newsQuestions = {};
        window._newsQuestions[`art_${state.currentDay}_${news.categoryKey}`] = questions;
        
        const isAI = questions[0]?.id?.startsWith('ai_');
        const sourceBadge = isAI
          ? '<span style="font-size:11px;background:rgba(109,40,217,0.12);color:#6d28d9;padding:3px 9px;border-radius:6px;font-weight:600;margin-left:8px;">🤖 AI 맞춤 질문</span>'
          : '<span style="font-size:11px;background:rgba(156,163,175,0.2);color:#6b7280;padding:3px 9px;border-radius:6px;font-weight:600;margin-left:8px;">📚 기본 질문</span>';
        
        return `
          <div class="card" id="news-card-${idx}">
            <span class="card-badge">${news.categoryIcon} ${news.categoryLabel}</span>
            
            ${news.isFallback ? `
            <div style="background:rgba(245,158,11,0.1); border:1.5px solid rgba(245,158,11,0.5); border-radius:12px; padding:12px 16px; margin:12px 0; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;">
              <span style="font-size:13px; color:#92400e; flex:1;">
                📡 실시간 뉴스를 불러오지 못했습니다 ${news.errorMsg ? `(${news.errorMsg})` : ''}. 잠시 후 다시 시도해 보세요.
              </span>
              <button onclick="clearNewsCache()" class="btn-secondary" style="font-size:12px; padding:6px 12px; flex-shrink:0;">
                🔄 재시도
              </button>
            </div>` : ''}
            
            <h2 class="card-title" style="margin-top:${news.isFallback ? '0' : '12px'};">${escapeHtml(news.title)}</h2>
            <p class="article-content">${escapeHtml(news.summary)}</p>
            
            ${news.link ? `
              <a href="${escapeAttr(news.link)}" target="_blank" rel="noopener" class="read-article-btn">
                📰 기사 전문 읽기 →
              </a>
            ` : ''}
            
            <div class="divider"></div>
            
            <h3 style="font-size: 16px; color: #4c1d95; margin-bottom: 16px; font-weight: 700;">💡 시사점 사고 ${sourceBadge}</h3>
            <p style="font-size: 13px; color: #7c3aed; margin-bottom: 14px;">
              이 뉴스를 읽고, 다음 질문들로 한 번 더 생각해 보세요.
            </p>
            
            ${questions.map((q, qIdx) => `
              <div class="question-block" id="q-${q.id}">
                <p class="question-text">
                  <span class="kind-badge kind-insight">💡 시사 ${qIdx + 1}</span>
                  ${q.text}
                </p>
                <div class="options-grid">
                  ${q.options.map((opt, optIdx) => `
                    <label class="option-label" data-q="${q.id}" data-idx="${optIdx}" onclick="selectOption('${q.id}', ${optIdx})">
                      <input type="radio" name="${q.id}" value="${optIdx}" />
                      <span>${opt}</span>
                    </label>
                  `).join('')}
                </div>
                <div id="feedback-${q.id}"></div>
              </div>
            `).join('')}
            
            <button class="btn-primary" onclick='submitNewsAnswers("${articleId}")'>제출하기</button>
          </div>
        `;
      }).join('');
    }
    
    // 안전한 HTML/속성 이스케이프
    function escapeHtml(s) {
      if (!s) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function escapeAttr(s) {
      return escapeHtml(s);
    }
    
    function selectOption(qId, optIdx) {
      document.querySelectorAll(`[data-q="${qId}"]`).forEach(el => el.classList.remove('selected'));
      const selected = document.querySelector(`[data-q="${qId}"][data-idx="${optIdx}"]`);
      if (selected) {
        selected.classList.add('selected');
        const radio = selected.querySelector('input[type="radio"]');
        if (radio) radio.checked = true;
      }
    }
    
    function submitNewsAnswers(articleId) {
      // 전역 맵에서 조회 (HTML 속성 직렬화 방식 제거 → 신뢰성 향상)
      const questions = (window._newsQuestions || {})[articleId];
      if (!questions || !questions.length) {
        alert('질문을 불러오지 못했습니다. 페이지를 새로고침해 주세요.');
        return;
      }
      const isAI = questions[0]?.id?.startsWith('ai_');
      console.log(`[submitNewsAnswers] ${articleId} | 출처: ${isAI ? '🤖 Claude AI' : '📚 정적 풀'} | 질문 수: ${questions.length}`);
      
      let allAnswered = true;
      const userAnswers = {};
      
      questions.forEach(q => {
        const selectedRadio = document.querySelector(`input[name="${q.id}"]:checked`);
        if (!selectedRadio) {
          allAnswered = false;
        } else {
          userAnswers[q.id] = parseInt(selectedRadio.value);
        }
      });
      
      if (!allAnswered) {
        alert('모든 문제에 답해주세요');
        return;
      }
      
      questions.forEach(q => {
        const userIdx = userAnswers[q.id];
        const isCorrect = userIdx === q.correct;
        const feedbackDiv = document.getElementById(`feedback-${q.id}`);
        
        document.querySelectorAll(`[data-q="${q.id}"]`).forEach(el => {
          const idx = parseInt(el.dataset.idx);
          el.classList.remove('selected');
          if (idx === q.correct) el.classList.add('correct');
          if (idx === userIdx && !isCorrect) el.classList.add('wrong');
          el.style.pointerEvents = 'none';
        });
        
        if (isCorrect) {
          feedbackDiv.innerHTML = `
            <div class="feedback-box feedback-correct">
              <div class="feedback-title">✅ 좋은 사고입니다!</div>
              <div>${q.explanation}</div>
            </div>
          `;
        } else {
          feedbackDiv.innerHTML = `
            <div class="feedback-box feedback-wrong">
              <div class="feedback-title">💭 더 깊이 생각해 보세요. 권장 답: "${q.options[q.correct]}"</div>
              <div>${q.explanation}</div>
            </div>
          `;
          addWrongAnswer('language', q.text, q.options[userIdx], q.options[q.correct], q.explanation);
        }
      });
      
      const articleProgress = state.progress[state.currentDay]?.language || { attempted: false, answers: {} };
      articleProgress.attempted = true;
      articleProgress.answers[articleId] = userAnswers;
      updateProgress(state.currentDay, 'language', articleProgress);
    }
    
    // ==================== 수리영역 ====================
    // 오늘의 문제 캐싱 (페이지 재렌더링 시에도 동일 문제)
    let todaysMathProblems = null;
    let todaysMathDay = null;
    
    function getTodaysMathProblems() {
      // 같은 날이면 캐시된 문제 반환 (Day가 바뀌면 재생성)
      if (todaysMathProblems && todaysMathDay === state.currentDay) {
        return todaysMathProblems;
      }
      const seenIds = state.seenMathIds || [];
      todaysMathProblems = getDailyMathProblems(state.currentDay, seenIds);
      todaysMathDay = state.currentDay;
      
      // 큐레이션 문제 ID를 "최근 본 목록"에 추가 (자동생성은 추가 안 함)
      const curatedToday = todaysMathProblems.find(p => !p.isAuto);
      if (curatedToday && !seenIds.includes(curatedToday.id)) {
        state.seenMathIds = [...seenIds, curatedToday.id].slice(-150); // 최근 150개만 유지
        saveState();
      }
      
      return todaysMathProblems;
    }
    
    function renderMathPage(container) {
      const dayProgress = getDayProgress(state.currentDay);
      const problems = getTodaysMathProblems();
      
      container.innerHTML = `
        <div class="page-header">
          <h1 class="page-title">🔢 수리영역</h1>
          <p class="page-subtitle">패턴, 논리, 추론을 통해 수 감각을 길러요</p>
        </div>
        
        ${dayProgress.math.attempted ? `
          <div class="complete-banner">
            <div class="complete-banner-icon">✅</div>
            <div class="complete-banner-text">오늘의 수리영역을 완료했습니다!<br>내일 새로운 문제로 만나요.</div>
          </div>
        ` : ''}
        
        ${problems.map((problem, idx) => `
          <div class="card">
            <span class="card-badge">${problem.cat}${problem.isAuto ? ' · 자동생성' : ''}</span>
            <h2 class="card-title">문제 ${idx + 1}</h2>
            <div class="problem-display">${problem.q}</div>
            <div class="options-vertical">
              ${problem.opts.map((opt, optIdx) => `
                <label class="option-label" data-q="${problem.id}" data-idx="${optIdx}" onclick="selectOption('${problem.id}', ${optIdx})">
                  <input type="radio" name="${problem.id}" value="${optIdx}" />
                  <span>${opt}</span>
                </label>
              `).join('')}
            </div>
            <div id="feedback-${problem.id}"></div>
            <button class="btn-primary" onclick="submitMathAnswer('${problem.id}')" id="submit-${problem.id}">제출하기</button>
          </div>
        `).join('')}
      `;
    }
    
    function submitMathAnswer(problemId) {
      const problems = getTodaysMathProblems();
      const problem = problems.find(p => p.id === problemId);
      if (!problem) return;
      
      const selectedRadio = document.querySelector(`input[name="${problemId}"]:checked`);
      if (!selectedRadio) {
        alert('답을 선택해주세요');
        return;
      }
      
      const userIdx = parseInt(selectedRadio.value);
      const isCorrect = userIdx === problem.correct;
      const feedbackDiv = document.getElementById(`feedback-${problemId}`);
      
      document.querySelectorAll(`[data-q="${problemId}"]`).forEach(el => {
        const idx = parseInt(el.dataset.idx);
        el.classList.remove('selected');
        if (idx === problem.correct) el.classList.add('correct');
        if (idx === userIdx && !isCorrect) el.classList.add('wrong');
        el.style.pointerEvents = 'none';
      });
      
      const submitBtn = document.getElementById(`submit-${problemId}`);
      if (submitBtn) submitBtn.style.display = 'none';
      
      if (isCorrect) {
        feedbackDiv.innerHTML = `
          <div class="feedback-box feedback-correct">
            <div class="feedback-title">✅ 정답입니다!</div>
            <div>${problem.exp}</div>
          </div>
        `;
      } else {
        feedbackDiv.innerHTML = `
          <div class="feedback-box feedback-wrong">
            <div class="feedback-title">❌ 아쉽네요. 정답은 "${problem.opts[problem.correct]}"입니다</div>
            <div>${problem.exp}</div>
          </div>
        `;
        addWrongAnswer('math', problem.q, problem.opts[userIdx], problem.opts[problem.correct], problem.exp);
      }
      
      const mathProgress = state.progress[state.currentDay]?.math || { attempted: false, answers: {} };
      mathProgress.attempted = true;
      mathProgress.answers[problemId] = userIdx;
      updateProgress(state.currentDay, 'math', mathProgress);
    }
    
    // ==================== 뇌 훈련 ====================
    let memoryGameState = { phase: 'idle', timer: null, countdown: 5 };
    let perceptionAnswered = false;
    
    // 오늘의 게임 캐싱 (Day별 결정론적 생성)
    let todaysMemoryGame = null;
    let todaysPerceptionGame = null;
    let todaysGameDay = null;
    
    function getTodaysMemoryGame() {
      if (todaysMemoryGame && todaysGameDay === state.currentDay) return todaysMemoryGame;
      todaysMemoryGame = genMemoryGame(state.currentDay);
      todaysGameDay = state.currentDay;
      return todaysMemoryGame;
    }
    
    function getTodaysPerceptionGame() {
      if (todaysPerceptionGame && todaysGameDay === state.currentDay) return todaysPerceptionGame;
      todaysPerceptionGame = genPerceptionGame(state.currentDay);
      return todaysPerceptionGame;
    }
    
    function renderBrainPage(container) {
      const dayProgress = getDayProgress(state.currentDay);
      
      container.innerHTML = `
        <div class="page-header">
          <h1 class="page-title">🧠 뇌 훈련</h1>
          <p class="page-subtitle">기억력과 관찰력을 함께 길러요</p>
        </div>
        
        <div class="card">
          <span class="card-badge">기억력 게임</span>
          <h2 class="card-title">🎯 숫자 기억하기</h2>
          <div id="memory-game-container">
            ${renderMemoryGame()}
          </div>
        </div>
        
        <div class="card">
          <span class="card-badge">관찰력 게임</span>
          <h2 class="card-title">👁 다른 글자 찾기</h2>
          <div id="perception-game-container">
            ${renderPerceptionGame()}
          </div>
        </div>
      `;
    }
    
    function renderMemoryGame() {
      const dayProgress = getDayProgress(state.currentDay);
      
      if (dayProgress.memory.attempted) {
        return `
          <div class="game-container">
            <div class="game-instruction">오늘의 기억력 게임을 완료했습니다!</div>
            <div style="font-size: 48px; margin: 20px 0;">${dayProgress.memory.success ? '🎉' : '💪'}</div>
            <div style="color: ${dayProgress.memory.success ? '#16a34a' : '#dc2626'}; font-weight: 600;">
              ${dayProgress.memory.success ? '성공!' : '아쉽지만 내일 다시!'}
            </div>
          </div>
        `;
      }
      
      const game = getTodaysMemoryGame();
      
      if (memoryGameState.phase === 'idle') {
        return `
          <div class="game-container">
            <p class="game-instruction">${game.instruction}</p>
            <button class="btn-primary" style="max-width: 240px; margin: 0 auto;" onclick="startMemoryGame()">시작하기</button>
          </div>
        `;
      }
      
      if (memoryGameState.phase === 'countdown') {
        return `
          <div class="game-container">
            <div class="game-instruction">잠시 후 숫자가 나타납니다</div>
            <div class="timer">${memoryGameState.countdown}</div>
          </div>
        `;
      }
      
      if (memoryGameState.phase === 'showing') {
        return `
          <div class="game-container">
            <div class="game-instruction">숫자를 잘 기억하세요!</div>
            <div class="number-display">
              ${game.numbers.map(n => `<div class="number-cell">${n}</div>`).join('')}
            </div>
            <div class="timer">${memoryGameState.countdown}</div>
          </div>
        `;
      }
      
      if (memoryGameState.phase === 'input') {
        return `
          <div class="game-container">
            <div class="game-instruction">기억한 숫자를 순서대로 입력하세요</div>
            <div class="input-row">
              ${game.numbers.map((_, idx) => `
                <input type="text" class="number-input" id="mem-input-${idx}" maxlength="1" oninput="autoFocusNext(${idx}, ${game.numbers.length})" />
              `).join('')}
            </div>
            <button class="btn-primary" style="max-width: 240px; margin: 0 auto;" onclick="checkMemoryAnswer()">확인</button>
          </div>
        `;
      }
      
      return '';
    }
    
    function autoFocusNext(idx, total) {
      const input = document.getElementById(`mem-input-${idx}`);
      if (input.value && idx < total - 1) {
        document.getElementById(`mem-input-${idx + 1}`).focus();
      }
    }
    
    function startMemoryGame() {
      memoryGameState.phase = 'countdown';
      memoryGameState.countdown = 3;
      updateMemoryGame();
      
      memoryGameState.timer = setInterval(() => {
        memoryGameState.countdown--;
        if (memoryGameState.countdown <= 0) {
          clearInterval(memoryGameState.timer);
          showMemoryNumbers();
        } else {
          updateMemoryGame();
        }
      }, 1000);
    }
    
    function showMemoryNumbers() {
      memoryGameState.phase = 'showing';
      memoryGameState.countdown = 5;
      updateMemoryGame();
      
      memoryGameState.timer = setInterval(() => {
        memoryGameState.countdown--;
        if (memoryGameState.countdown <= 0) {
          clearInterval(memoryGameState.timer);
          memoryGameState.phase = 'input';
          updateMemoryGame();
          setTimeout(() => {
            const firstInput = document.getElementById('mem-input-0');
            if (firstInput) firstInput.focus();
          }, 100);
        } else {
          updateMemoryGame();
        }
      }, 1000);
    }
    
    function updateMemoryGame() {
      const c = document.getElementById('memory-game-container');
      if (c) c.innerHTML = renderMemoryGame();
    }
    
    function checkMemoryAnswer() {
      const game = getTodaysMemoryGame();
      const inputs = [];
      let allFilled = true;
      
      for (let i = 0; i < game.numbers.length; i++) {
        const val = document.getElementById(`mem-input-${i}`).value.trim();
        if (!val) allFilled = false;
        inputs.push(val);
      }
      
      if (!allFilled) {
        alert('모든 칸을 채워주세요');
        return;
      }
      
      const userAnswer = inputs.join('');
      const correctAnswer = game.numbers.join('');
      const isCorrect = userAnswer === correctAnswer;
      
      memoryGameState.phase = 'idle';
      updateProgress(state.currentDay, 'memory', { attempted: true, success: isCorrect });
      
      if (!isCorrect) {
        addWrongAnswer(
          'memory',
          `숫자 기억: ${game.numbers.join(', ')}을 순서대로 기억하기`,
          inputs.join(', '),
          game.numbers.join(', '),
          '숫자를 더 작은 그룹으로 나눠서 외우면 도움이 됩니다. 예: 73-925'
        );
      }
      
      const c = document.getElementById('memory-game-container');
      if (c) {
        c.innerHTML = `
          <div class="game-container">
            <div style="font-size: 48px; margin: 20px 0;">${isCorrect ? '🎉' : '💪'}</div>
            <div style="font-size: 18px; font-weight: 700; color: ${isCorrect ? '#16a34a' : '#dc2626'}; margin-bottom: 12px;">
              ${isCorrect ? '정답입니다!' : '아쉽네요'}
            </div>
            <div style="font-size: 14px; color: #5d4e9e;">
              정답: <strong>${game.numbers.join(' - ')}</strong><br>
              내 답: ${inputs.join(' - ')}
            </div>
          </div>
        `;
      }
    }
    
    function renderPerceptionGame() {
      const dayProgress = getDayProgress(state.currentDay);
      
      if (dayProgress.perception.attempted) {
        return `
          <div class="game-container">
            <div class="game-instruction">오늘의 관찰력 게임을 완료했습니다!</div>
            <div style="font-size: 48px; margin: 20px 0;">${dayProgress.perception.success ? '🎉' : '💪'}</div>
          </div>
        `;
      }
      
      const game = getTodaysPerceptionGame();
      
      return `
        <div class="game-container">
          <p class="game-instruction">${game.instruction}</p>
          <div class="difference-game">
            <div class="difference-box">${game.line1}</div>
            <div class="difference-box">${game.line2}</div>
          </div>
          <p class="game-instruction" style="font-size: 14px;">두 줄을 비교하여 다른 글자를 입력하세요 (예: 여덟 / 여덜)</p>
          <input type="text" class="form-input" id="perception-answer" placeholder="다른 글자를 입력하세요" style="max-width: 320px; margin: 0 auto;" />
          <button class="btn-primary" style="max-width: 240px; margin: 16px auto 0;" onclick="checkPerceptionAnswer()">확인</button>
        </div>
      `;
    }
    
    function checkPerceptionAnswer() {
      const game = getTodaysPerceptionGame();
      const userInput = document.getElementById('perception-answer').value.trim();
      
      if (!userInput) {
        alert('답을 입력해주세요');
        return;
      }
      
      // expectedDiff는 "맑 → 막" 형태로 저장됨. 양쪽 글자 중 하나라도 입력에 포함되면 정답
      const diffParts = game.expectedDiff.split('→').map(s => s.trim());
      const isCorrect = diffParts.some(part => userInput.includes(part));
      
      updateProgress(state.currentDay, 'perception', { attempted: true, success: isCorrect });
      
      if (!isCorrect) {
        addWrongAnswer(
          'perception',
          '두 줄에서 다른 글자 찾기',
          userInput,
          game.expectedDiff,
          game.explanation
        );
      }
      
      const c = document.getElementById('perception-game-container');
      if (c) {
        c.innerHTML = `
          <div class="game-container">
            <div style="font-size: 48px; margin: 20px 0;">${isCorrect ? '🎉' : '💪'}</div>
            <div style="font-size: 18px; font-weight: 700; color: ${isCorrect ? '#16a34a' : '#dc2626'}; margin-bottom: 12px;">
              ${isCorrect ? '정답입니다!' : '아쉽네요'}
            </div>
            <div style="font-size: 14px; color: #5d4e9e; line-height: 1.6;">
              정답: <strong>${game.expectedDiff}</strong><br>
              ${game.explanation}
            </div>
          </div>
        `;
      }
    }
    
    // ==================== 오답노트 ====================
    function renderEmailPage(container) {
      const today = state.currentDay;
      // 오늘의 오답만 모음
      const todaysWrongs = state.wrongAnswers.filter(w => w.day === today);
      // 누적 통계
      const totalDays = Object.keys(state.progress).length;
      const totalWrong = state.wrongAnswers.length;
      
      const domainLabels = {
        language: '📖 언어영역 (시사 사고)',
        math: '🔢 수리영역',
        memory: '🧠 기억력',
        perception: '👁 관찰력'
      };
      
      // 이메일 본문 미리보기 텍스트
      const buildEmailBody = () => {
        const todayDateStr = new Date().toLocaleDateString('ko-KR', {
          year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
        });
        let body = `Senior BrainStation - Day ${today} 학습 정리\n`;
        body += `${todayDateStr}\n`;
        body += `\n${'='.repeat(50)}\n\n`;
        
        if (todaysWrongs.length === 0) {
          body += `🎉 오늘은 틀린 문제가 없습니다!\n완벽한 하루를 보내셨네요.\n\n`;
        } else {
          body += `오늘 다시 한 번 생각해 볼 ${todaysWrongs.length}개 문항입니다.\n\n`;
          todaysWrongs.forEach((w, i) => {
            body += `━━━ ${i + 1}. ${domainLabels[w.domain] || w.domain} ━━━\n`;
            body += `\n💭 문제: ${w.question}\n`;
            body += `\n❌ 내 답: ${w.userAnswer}\n`;
            body += `✅ 권장 답: ${w.correctAnswer}\n`;
            body += `\n💡 해설: ${w.explanation}\n\n`;
          });
        }
        
        body += `${'='.repeat(50)}\n`;
        body += `\n오늘도 두뇌를 단련해 주셔서 감사합니다.\n`;
        body += `내일도 Senior BrainStation에서 만나요! 🧠\n`;
        return body;
      };
      
      const buildSubject = () => {
        return `Senior BrainStation - Day ${today} 학습 정리 (${todaysWrongs.length}개 오답)`;
      };
      
      const buildMailtoUrl = () => {
        const to = state.userEmail || '';
        const subject = encodeURIComponent(buildSubject());
        const body = encodeURIComponent(buildEmailBody());
        return `mailto:${to}?subject=${subject}&body=${body}`;
      };
      
      container.innerHTML = `
        <div class="page-header">
          <h1 class="page-title">✉️ 이메일 정리</h1>
          <p class="page-subtitle">오늘의 학습 결과를 이메일로 받아보세요</p>
        </div>
        
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-card-label">현재</div>
            <div class="stat-card-value">Day ${today}</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">학습일수</div>
            <div class="stat-card-value">${totalDays}일</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">오늘 오답</div>
            <div class="stat-card-value">${todaysWrongs.length}개</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">누적 오답</div>
            <div class="stat-card-value">${totalWrong}개</div>
          </div>
        </div>
        
        ${!state.userEmail ? `
          <div class="card" style="border:2px dashed rgba(139,92,246,0.4);">
            <h3 class="card-title">📮 이메일 설정 (선택)</h3>
            <p style="color:#7c3aed; margin-bottom:14px; line-height:1.6;">
              이메일을 미리 등록하시면 발송 시 자동으로 채워집니다.<br>
              지금 등록 안 하셔도, 발송할 때 메일 앱에서 직접 입력해도 됩니다.
            </p>
            <button class="btn-primary" style="max-width:200px;" onclick="openSettings()">⚙️ 설정 열기</button>
          </div>
        ` : ''}
        
        <div class="card">
          <h3 class="card-title">📋 오늘의 오답 정리</h3>
          
          ${todaysWrongs.length === 0 ? `
            <div class="empty-state">
              <div class="empty-state-icon">🌟</div>
              <div class="empty-state-text">
                오늘은 아직 틀린 문제가 없습니다!<br>
                학습을 시작하시려면 좌측 메뉴에서 영역을 선택해 주세요.
              </div>
            </div>
          ` : `
            <p style="color:#7c3aed; margin-bottom:16px;">
              아래는 오늘 다시 한 번 생각해 볼 ${todaysWrongs.length}개 문항입니다.
              이메일로 받으시면 천천히 복습하실 수 있어요.
            </p>
            
            ${todaysWrongs.map((w, i) => `
              <div class="blog-question" style="margin-bottom:14px;">
                <div class="blog-q-domain">${domainLabels[w.domain] || w.domain}</div>
                <div class="blog-q-text">${i+1}. ${escapeHtml(w.question)}</div>
                <div class="blog-answer-row blog-answer-wrong">❌ <span><strong>내 답:</strong> ${escapeHtml(w.userAnswer)}</span></div>
                <div class="blog-answer-row blog-answer-correct">✅ <span><strong>권장 답:</strong> ${escapeHtml(w.correctAnswer)}</span></div>
                <div class="blog-explanation">
                  <strong>💡 해설:</strong><br>${escapeHtml(w.explanation)}
                </div>
              </div>
            `).join('')}
          `}
        </div>
        
        ${todaysWrongs.length > 0 ? `
          <div class="card" style="background: linear-gradient(135deg, rgba(109,40,217,0.08), rgba(139,92,246,0.12));">
            <h3 class="card-title">📨 이메일로 받기</h3>
            <p style="color:#5d4e9e; margin-bottom:16px; line-height:1.7;">
              아래 버튼을 누르면 본인 메일 앱이 열리고,<br>
              위 내용이 정리된 이메일이 자동으로 작성됩니다.<br>
              <strong>받는 사람을 확인하고 [전송] 버튼을 눌러주세요.</strong>
            </p>
            
            ${state.userEmail ? `
              <p style="font-size:13px; color:#7c3aed; margin-bottom:14px;">
                받는 이메일: <strong>${escapeHtml(state.userEmail)}</strong>
                <span style="margin-left:8px; opacity:0.7; cursor:pointer;" onclick="openSettings()">변경 ✎</span>
              </p>
            ` : `
              <p style="font-size:13px; color:#dc2626; margin-bottom:14px;">
                ⚠️ 이메일이 설정되지 않았습니다. 메일 앱에서 직접 받는 사람을 입력해 주세요.
              </p>
            `}
            
            <a href="${buildMailtoUrl()}" class="btn-primary" style="display:inline-flex; align-items:center; justify-content:center; text-decoration:none; max-width:280px; margin:0 auto;">
              ✉️ 이메일 작성 열기
            </a>
            
            <details style="margin-top:20px; font-size:13px;">
              <summary style="cursor:pointer; color:#7c3aed; font-weight:600;">📋 이메일 내용 미리보기</summary>
              <pre style="background:rgba(255,255,255,0.5); border-radius:10px; padding:16px; margin-top:10px; white-space:pre-wrap; font-family:'Noto Sans KR', sans-serif; font-size:12px; color:#4c1d95; line-height:1.7; overflow-x:auto;">${escapeHtml(buildEmailBody())}</pre>
            </details>
          </div>
        ` : ''}
      `;
    }
    
    // ==================== 초기 렌더링 ====================
    render();
    

  </script>
</body>
</html>
